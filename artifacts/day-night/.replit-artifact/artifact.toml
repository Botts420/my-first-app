kind = "web"
previewPath = "/"
title = "Day/Night Photo Converter"
version = "1.0.0"
id = "artifacts/day-night"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21394

[services.development]
run = "pnpm --filter @workspace/day-night run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/day-night", "run", "build" ]
publicDir = "artifacts/day-night/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21394"
BASE_PATH = "/"
